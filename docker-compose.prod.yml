services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: prod
    volumes:
      - sqlite_data:/app/data
    environment:
      DATABASE_URL: sqlite:////app/data/contree.db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
