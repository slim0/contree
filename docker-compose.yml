services:
  pocketbase:
    build:
      context: .
      dockerfile: Dockerfile.pocketbase
    ports:
      - "8090:8090"
    volumes:
      - pocketbase_data:/pb/pb_data
    environment:
      PB_SUPERUSER_EMAIL: admin@contree.local
      PB_SUPERUSER_PASSWORD: dev-superuser-password
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend   # hot-reload Python
      - ./DEV:/app/DEV
    environment:
      PB_URL: http://pocketbase:8090
      PB_SUPERUSER_EMAIL: admin@contree.local
      PB_SUPERUSER_PASSWORD: dev-superuser-password
      DEVELOPMENT: "true"
    depends_on:
      pocketbase:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src         # hot-reload Vite
      - ./frontend/public:/app/public
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  pocketbase_data:
