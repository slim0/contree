<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Belote Contrée</title>
    <style>
      body { font-family: monospace; margin: 20px; background: #1a1a1a; color: #eee; }
      button { margin: 3px; padding: 6px 12px; cursor: pointer; background: #333; color: #eee; border: 1px solid #666; border-radius: 4px; font-family: monospace; }
      button:hover { background: #555; }
      button.legal { border-color: #4a9; color: #4a9; }
      button.action { border-color: #a94; color: #f84; }
      input, select { background: #333; color: #eee; border: 1px solid #666; padding: 5px; border-radius: 4px; font-family: monospace; }
      .section { border: 1px solid #444; padding: 10px; margin: 8px 0; border-radius: 4px; }
      .section h3 { margin: 0 0 8px 0; color: #aaa; font-size: 0.85em; text-transform: uppercase; }
      .log { height: 180px; overflow-y: auto; font-size: 0.8em; color: #aaa; }
      .log p { margin: 2px 0; }
      .card { display: inline-block; margin: 2px; padding: 4px 8px; border: 1px solid #555; border-radius: 3px; }
      .card.H, .card.D { color: #f66; }
      .card.C, .card.S { color: #eee; }
      .error { color: #f66; }
      .info { color: #4af; }
      .my-turn { color: #4a9; font-weight: bold; }
      .scores { display: flex; gap: 20px; }
      .score-item { padding: 4px 10px; border: 1px solid #555; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
