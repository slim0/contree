<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Belote Contrée</title>
    <style>
      * { box-sizing: border-box; }
      body { font-family: monospace; margin: 0; padding: 12px; background: #1a1a1a; color: #eee; }

      button { margin: 2px; padding: 5px 10px; cursor: pointer; background: #2a2a2a; color: #eee; border: 1px solid #555; border-radius: 4px; font-family: monospace; font-size: 0.85em; }
      button:hover { background: #444; }
      button.legal { border-color: #4a9; color: #4a9; background: #1a2e24; }
      button.legal:hover { background: #254035; }
      button.action { border-color: #c87; color: #f96; background: #2a1e10; }
      button.action:hover { background: #3a2a18; }
      button:disabled { opacity: 0.4; cursor: default; }

      input, select { background: #2a2a2a; color: #eee; border: 1px solid #555; padding: 5px 8px; border-radius: 4px; font-family: monospace; font-size: 0.85em; }

      h3 { margin: 0 0 6px 0; color: #888; font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.05em; }

      .panel { border: 1px solid #333; padding: 8px 12px; margin: 6px 0; border-radius: 6px; background: #222; }
      .error { color: #f66; margin: 4px 0; font-size: 0.85em; }
      .my-turn { color: #4d9; font-weight: bold; }

      /* ── TABLE LOSANGE ── */
      .table-wrap { display: flex; justify-content: center; margin: 8px 0; }
      .table-grid {
        display: grid;
        grid-template-areas:
          ". top ."
          "left center right"
          ". bottom .";
        grid-template-columns: 160px 1fr 160px;
        grid-template-rows: auto auto auto;
        gap: 6px;
        width: 100%;
        max-width: 820px;
        align-items: center;
        justify-items: center;
      }
      .slot-top    { grid-area: top; }
      .slot-left   { grid-area: left; }
      .slot-center { grid-area: center; }
      .slot-right  { grid-area: right; }
      .slot-bottom { grid-area: bottom; }

      /* ── PLAYER SLOT ── */
      .player-slot {
        border: 1px solid #333;
        border-radius: 8px;
        padding: 6px 10px;
        background: #222;
        min-width: 100px;
        width: 100%;
        text-align: center;
      }
      .player-slot.active-bidder { border-color: #fa6; }
      .player-slot.active-player { border-color: #4d9; }
      .player-slot.dealer { border-color: #aaa; }
      .player-name { font-size: 0.9em; font-weight: bold; margin-bottom: 4px; }
      .player-pos  { font-size: 0.7em; color: #888; margin-bottom: 4px; }
      .player-team-ns { color: #6af; }
      .player-team-ew { color: #f96; }
      .card-backs { color: #666; font-size: 0.8em; letter-spacing: 1px; }

      /* ── CARDS ── */
      .card {
        display: inline-block;
        margin: 2px;
        padding: 4px 7px;
        border: 1px solid #555;
        border-radius: 4px;
        font-size: 0.9em;
        background: #2a2a2a;
        cursor: default;
      }
      .card.H, .card.D { color: #f77; }
      .card.C, .card.S { color: #ddd; }
      .card.playable { border-color: #4a9; color: #4d9; cursor: pointer; background: #1a2e24; }
      .card.playable.H, .card.playable.D { color: #f96; border-color: #f96; background: #2e1a1a; }
      .card.playable:hover { filter: brightness(1.3); transform: translateY(-2px); }
      .hand-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 2px; }

      /* ── TRICK CENTER ── */
      .trick-grid {
        display: grid;
        grid-template-areas: ". tn ." "tw tc te" ". ts .";
        grid-template-columns: 1fr auto 1fr;
        grid-template-rows: auto auto auto;
        gap: 4px;
        align-items: center;
        justify-items: center;
        min-width: 180px;
        min-height: 120px;
        border: 1px solid #333;
        border-radius: 8px;
        padding: 8px;
        background: #1e2a1e;
      }
      .trick-pos-top    { grid-area: tn; }
      .trick-pos-left   { grid-area: tw; }
      .trick-pos-center { grid-area: tc; font-size: 0.7em; color: #666; }
      .trick-pos-right  { grid-area: te; }
      .trick-pos-bottom { grid-area: ts; }
      .trick-card { padding: 5px 9px; border: 1px solid #555; border-radius: 4px; background: #2a2a2a; font-size: 0.95em; }
      .trick-card.H, .trick-card.D { color: #f77; }
      .trick-card.C, .trick-card.S { color: #ddd; }
      .trick-card.winner { border-color: #ff0; background: #2a2a10; }

      /* ── SCORES ── */
      .score-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      .score-team {
        flex: 1; min-width: 140px;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 6px 12px;
        background: #222;
      }
      .score-team.ns { border-color: #336; }
      .score-team.ew { border-color: #633; }
      .score-value { font-size: 1.4em; font-weight: bold; }
      .score-progress {
        height: 4px; background: #333; border-radius: 2px; margin-top: 4px;
      }
      .score-fill-ns { height: 100%; background: #6af; border-radius: 2px; transition: width 0.3s; }
      .score-fill-ew { height: 100%; background: #f96; border-radius: 2px; transition: width 0.3s; }
      .score-target { font-size: 0.7em; color: #888; }
      .last-result {
        flex: 2; min-width: 200px;
        border: 1px solid #333; border-radius: 6px;
        padding: 6px 12px; background: #222;
        font-size: 0.8em; color: #aaa;
      }
      .result-made  { color: #4d9; }
      .result-chute { color: #f66; }

      /* ── BID PANEL ── */
      .bid-panel { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }

      /* ── LOG ── */
      .log { height: 150px; overflow-y: auto; font-size: 0.78em; color: #888; }
      .log p { margin: 1px 0; }
      .log p:first-child { color: #bbb; }

      /* top-bar header */
      .top-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 6px; }
      .top-bar .room-info { font-size: 0.85em; color: #888; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
