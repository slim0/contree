<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Belote Contrée</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; }
      body { font-family: monospace; margin: 0; padding: 10px; background: #1a1a1a; color: #eee; font-size: 15px; }

      /* ── LANDING PAGE (préfixe lp- pour isolation) ── */
      .lp-root {
        position: fixed; inset: 0;
        overflow-y: auto;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fbfbf9;
        font-family: Inter, -apple-system, system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        padding: 16px;
      }
      .lp-card {
        background: #ffffff;
        border-radius: 32px;
        padding: 40px 44px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 16px 48px rgba(0,0,0,0.10);
      }
      .lp-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 28px;
      }
      .lp-logo-mark {
        width: 44px; height: 44px;
        background: #e60023;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 24px;
        line-height: 1;
      }
      .lp-title {
        font-size: 28px; font-weight: 700;
        color: #000000;
        letter-spacing: -1.2px; line-height: 1.2;
        text-align: center;
        margin: 0 0 6px 0;
      }
      .lp-subtitle {
        font-size: 14px; font-weight: 400;
        color: #62625b; line-height: 1.4;
        text-align: center;
        margin: 0 0 28px 0;
      }
      .lp-label {
        display: block;
        font-size: 14px; font-weight: 600;
        color: #000000;
        margin-bottom: 8px;
      }
      .lp-input {
        width: 100%;
        background: #ffffff; color: #000000;
        border: 1.5px solid #91918c;
        padding: 11px 15px;
        border-radius: 16px;
        font-family: inherit; font-size: 16px;
        min-height: 44px; outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      .lp-input:focus { border-color: #000000; box-shadow: 0 0 0 3px #435ee5; }
      .lp-input::placeholder { color: #91918c; }
      .lp-btn-primary {
        display: block; width: 100%;
        background: #e60023; color: #ffffff;
        border: none; border-radius: 16px;
        padding: 0 14px; height: 48px;
        font-family: inherit; font-size: 14px; font-weight: 700;
        cursor: pointer; transition: background 0.12s;
        margin-top: 16px;
      }
      .lp-btn-primary:hover:not(:disabled) { background: #cc001f; }
      .lp-btn-primary:disabled { background: #f6f6f3; color: #91918c; cursor: default; }
      .lp-btn-secondary {
        display: block; width: 100%;
        background: #e5e5e0; color: #000000;
        border: none; border-radius: 16px;
        padding: 0 14px; height: 48px;
        font-family: inherit; font-size: 14px; font-weight: 700;
        cursor: pointer; transition: background 0.12s;
        margin-top: 12px;
      }
      .lp-btn-secondary:hover { background: #c8c8c1; }
      .lp-divider {
        display: flex; align-items: center; gap: 12px;
        color: #91918c; font-size: 12px; font-weight: 500;
        margin: 20px 0;
      }
      .lp-divider::before, .lp-divider::after {
        content: ''; flex: 1; height: 1px; background: #dadad3;
      }
      .lp-error {
        color: #9e0a0a; font-size: 14px;
        margin-top: 12px; padding: 8px 12px;
        background: #fff0f0; border-radius: 10px;
        line-height: 1.4;
      }
      .lp-back {
        background: none; border: none;
        color: #62625b; font-size: 14px; font-weight: 600;
        cursor: pointer; padding: 0;
        margin-bottom: 20px;
        display: inline-flex; align-items: center; gap: 6px;
        font-family: inherit;
      }
      .lp-back:hover { color: #000000; }
      .lp-code-box {
        background: #f6f6f3;
        border-radius: 16px;
        padding: 14px 20px;
        text-align: center;
        margin: 12px 0;
      }
      .lp-code {
        font-size: 28px; font-weight: 700;
        letter-spacing: 6px; color: #000000;
        font-family: inherit;
      }
      .lp-code-hint {
        font-size: 12px; color: #62625b;
        margin-top: 4px;
      }
      .lp-btn-copy {
        display: block; width: 100%;
        background: transparent; color: #62625b;
        border: 1.5px solid #dadad3; border-radius: 16px;
        padding: 0 14px; height: 40px;
        font-family: inherit; font-size: 13px; font-weight: 600;
        cursor: pointer; transition: background 0.12s, color 0.12s;
        margin-top: 8px;
      }
      .lp-btn-copy:hover { background: #f6f6f3; color: #000; }
      .lp-score-selector { margin: 16px 0 4px; }
      .lp-score-options { display: flex; gap: 8px; margin-top: 8px; }
      .lp-score-btn {
        flex: 1; height: 44px;
        background: #f6f6f3; color: #62625b;
        border: 1.5px solid #dadad3; border-radius: 12px;
        font-family: inherit; font-size: 14px; font-weight: 600;
        cursor: pointer; transition: all 0.12s; margin: 0;
      }
      .lp-score-btn:hover { background: #e5e5e0; color: #000; }
      .lp-score-btn.active { background: #e60023; color: #fff; border-color: #e60023; }
      .lp-reconnect {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #fbfbf9;
        font-family: Inter, -apple-system, system-ui, sans-serif;
        color: #62625b; font-size: 15px; font-weight: 500;
      }
      @media (max-width: 480px) {
        .lp-card { padding: 28px 24px; border-radius: 24px; }
        .lp-title { font-size: 24px; }
      }

      button { margin: 2px; padding: 8px 14px; cursor: pointer; background: #2a2a2a; color: #eee; border: 1px solid #555; border-radius: 6px; font-family: monospace; font-size: 0.9em; min-height: 38px; touch-action: manipulation; }
      button:hover { background: #444; }
      button.action { border-color: #c87; color: #f96; background: #2a1e10; }
      button.action:hover { background: #3a2a18; }
      button:disabled { opacity: 0.4; cursor: default; }

      input, select { background: #2a2a2a; color: #eee; border: 1px solid #555; padding: 7px 10px; border-radius: 6px; font-family: monospace; font-size: 0.9em; min-height: 38px; }

      h3 { margin: 0 0 7px 0; color: #888; font-size: 0.78em; text-transform: uppercase; letter-spacing: 0.05em; }

      .panel { border: 1px solid #333; padding: 9px 12px; margin: 5px 0; border-radius: 8px; background: #222; }
      .error { color: #f66; margin: 4px 0; font-size: 0.9em; padding: 4px 8px; }
      .my-turn { color: #4d9; font-weight: bold; }

      /* ── GAME WRAPPER ── */
      .game-wrap { display: flex; flex-direction: column; gap: 5px; max-width: 960px; margin: 0 auto; }

      /* ── HEADER COMPACT ── */
      .game-header {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 16px;
        align-items: center;
        padding: 8px 12px;
        background: #222;
        border: 1px solid #333;
        border-radius: 8px;
      }
      .header-room { font-size: 0.9em; }
      .header-player { color: #888; font-size: 0.9em; }
      .header-scores { display: flex; align-items: center; gap: 4px; font-size: 0.95em; }
      .score-num { font-size: 1.2em; margin: 0 2px; }
      .score-sep { color: #555; }
      .score-limit { color: #666; font-size: 0.85em; }
      .last-inline { font-size: 0.8em; padding: 1px 5px; border-radius: 3px; }
      .header-contract { font-size: 0.9em; color: #ccc; }
      .player-team-ns { color: #6af; font-weight: bold; }
      .player-team-ew { color: #f96; font-weight: bold; }
      .result-made  { color: #4d9; }
      .result-chute { color: #f66; }

      /* ── ROUND RESULT OVERLAY ── */
      @keyframes rr-anim {
        0%   { opacity: 0; transform: scale(0.88); }
        8%   { opacity: 1; transform: scale(1); }
        80%  { opacity: 1; transform: scale(1); }
        100% { opacity: 0; transform: scale(0.95); }
      }
      .rr-overlay {
        position: fixed; inset: 0; z-index: 1000;
        display: flex; align-items: center; justify-content: center;
        background: rgba(0,0,0,0.62);
        animation: rr-anim 4s ease-in-out forwards;
        pointer-events: none;
      }
      .rr-box {
        background: #12122a;
        border: 2px solid #444;
        border-radius: 18px;
        padding: 20px 36px 24px;
        text-align: center;
        min-width: 260px;
        max-width: 88vw;
        box-shadow: 0 8px 40px rgba(0,0,0,0.7);
      }
      .rr-round  { font-size: 0.8em; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .08em; }
      .rr-title  { font-size: 1.9em; font-weight: bold; margin-bottom: 6px; }
      .rr-made   { color: #4d9; }
      .rr-chute  { color: #f55; }
      .rr-contract { font-size: 0.9em; color: #bbb; margin-bottom: 14px; }
      .rr-scores { display: flex; align-items: center; justify-content: center; gap: 20px; }
      .rr-score-col { text-align: center; }
      .rr-pts    { font-size: 1.7em; font-weight: bold; color: #eee; margin: 3px 0; }
      .rr-total  { font-size: 0.75em; color: #777; }
      .rr-score-sep { font-size: 1.2em; color: #444; }

      /* ── SCORE PROGRESS BARS (slim) ── */
      .score-bars { display: flex; flex-direction: column; gap: 3px; margin: 0; }
      .score-bar-item { height: 4px; background: #2a2a2a; border-radius: 2px; overflow: hidden; }
      .score-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }

      /* ── TABLE LOSANGE ── */
      .table-wrap { display: flex; justify-content: center; }
      .table-grid {
        display: grid;
        grid-template-areas:
          ". top ."
          "left center right"
          ". bottom .";
        grid-template-columns: minmax(120px, 190px) 1fr minmax(120px, 190px);
        grid-template-rows: auto auto auto;
        gap: 6px;
        width: 100%;
        align-items: center;
        justify-items: center;
      }
      .slot-top    { grid-area: top; }
      .slot-left   { grid-area: left; }
      .slot-center { grid-area: center; }
      .slot-right  { grid-area: right; }
      .slot-bottom { grid-area: bottom; }

      /* ── PLAYER SLOT ── */
      .player-slot {
        border: 1px solid #333;
        border-radius: 8px;
        padding: 8px 10px;
        background: #222;
        min-width: 100px;
        width: 100%;
        text-align: center;
      }
      .player-slot.active-bidder { border-color: #fa6; }
      .player-slot.active-player { border-color: #4d9; }
      .player-slot.dealer { border-color: #aaa; }
      .player-name { font-size: 1em; font-weight: bold; margin-bottom: 4px; }
      .player-pos  { font-size: 0.82em; color: #aaa; margin-bottom: 4px; display: flex; flex-wrap: wrap; gap: 3px; justify-content: center; align-items: center; }
      .badge-dealer { color: #aaa; }
      .badge-action { font-weight: bold; }

      /* ── PLAYING CARD ── */
      .playing-card {
        width: 46px; height: 66px;
        background: #fff;
        border-radius: 5px;
        border: 1px solid #bbb;
        box-shadow: 1px 2px 5px rgba(0,0,0,0.55);
        position: relative;
        user-select: none;
        cursor: default;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 2px 3px;
        font-family: Georgia, 'Times New Roman', serif;
        font-weight: bold;
        flex-shrink: 0;
        transition: transform 0.12s;
      }
      .playing-card.red { color: #cc1111; }
      .playing-card.black { color: #111; }
      .playing-card.playable { cursor: pointer; box-shadow: 0 0 10px rgba(60,170,90,0.75), 1px 2px 5px rgba(0,0,0,0.4); border-color: #3ca85a; }
      .playing-card.playable:hover { transform: translateY(-9px); }
      .playing-card.winner { box-shadow: 0 0 14px rgba(255,215,0,0.9), 1px 2px 5px rgba(0,0,0,0.5); border-color: gold; }
      .playing-card.compact { width: 38px; height: 54px; padding: 2px; }
      .pc-tl { align-self: flex-start; text-align: center; line-height: 1.1; }
      .pc-br { align-self: flex-end; text-align: center; line-height: 1.1; transform: rotate(180deg); }
      .pc-rank { font-size: 13px; line-height: 1; }
      .pc-sym  { font-size: 11px; line-height: 1; }
      .playing-card.compact .pc-rank { font-size: 11px; }
      .playing-card.compact .pc-sym  { font-size: 9px; }
      .pc-center {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        font-size: 20px; line-height: 1; pointer-events: none;
      }
      .playing-card.compact .pc-center { font-size: 16px; }

      /* ── HAND FAN ── */
      .hand-fan-wrap { display: flex; justify-content: center; overflow: visible; padding: 8px 0 6px; }
      .hand-fan { position: relative; height: 84px; overflow: visible; }

      /* ── CARD BACKS ── */
      .card-backs-row { display: flex; justify-content: center; align-items: center; gap: 2px; padding: 4px 0; }
      .card-back { width: 22px; height: 32px; background: linear-gradient(135deg, #1a3a8a 0%, #0d225a 100%); border-radius: 3px; border: 1px solid #335; box-shadow: 1px 1px 3px rgba(0,0,0,0.5); flex-shrink: 0; }
      .card-backs-count { font-size: 0.7em; color: #888; margin-left: 2px; }

      /* ── TRICK CENTER ── */
      .trick-grid {
        display: grid;
        grid-template-areas: ". tn ." "tw tc te" ". ts .";
        grid-template-columns: 1fr auto 1fr;
        grid-template-rows: auto auto auto;
        gap: 6px;
        align-items: center;
        justify-items: center;
        min-width: 170px;
        min-height: 130px;
        border: 1px solid #333;
        border-radius: 8px;
        padding: 10px;
        background: #1e2a1e;
      }
      .trick-pos-top    { grid-area: tn; }
      .trick-pos-left   { grid-area: tw; }
      .trick-pos-center { grid-area: tc; font-size: 0.7em; color: #666; text-align: center; }
      .trick-pos-right  { grid-area: te; }
      .trick-pos-bottom { grid-area: ts; }

      /* ── BID PANEL ── */
      .bid-panel { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
      .bid-panel-wrap { margin-top: 4px; }

      /* ── PAYSAGE MOBILE (≤ 600px de hauteur) ── */
      @media (orientation: landscape) and (max-height: 520px) {
        body { padding: 4px 8px; font-size: 13px; }

        .game-wrap { gap: 3px; }

        .game-header { padding: 5px 10px; gap: 6px 12px; border-radius: 6px; }
        .score-num { font-size: 1.1em; }

        .score-bars { display: none; } /* masqués : déjà dans header */

        .table-grid {
          grid-template-columns: minmax(90px, 130px) 1fr minmax(90px, 130px);
          gap: 3px;
        }

        .player-slot { padding: 5px 7px; min-width: 80px; }
        .player-name { font-size: 0.9em; margin-bottom: 2px; }
        .player-pos  { font-size: 0.75em; margin-bottom: 2px; gap: 2px; }

        .trick-grid { min-width: 120px; min-height: 100px; padding: 6px; gap: 4px; }

        .playing-card { width: 38px; height: 54px; padding: 2px; }
        .pc-rank { font-size: 11px; }
        .pc-sym  { font-size: 9px; }
        .pc-center { font-size: 16px; }
        .playing-card.compact { width: 30px; height: 43px; }
        .playing-card.compact .pc-rank { font-size: 9px; }
        .playing-card.compact .pc-sym  { font-size: 7px; }
        .playing-card.compact .pc-center { font-size: 12px; }
        .hand-fan { height: 68px; }
        .hand-fan-wrap { padding: 5px 0 4px; }

        button { padding: 6px 10px; min-height: 34px; font-size: 0.85em; }
        select, input { padding: 5px 7px; min-height: 34px; font-size: 0.85em; }

        h3 { font-size: 0.72em; margin-bottom: 4px; }
        .panel { padding: 6px 10px; margin: 3px 0; border-radius: 6px; }
        .bid-panel { gap: 5px; }
      }

      /* ── PORTRAIT MOBILE (≤ 640px de largeur) ── */
      @media (orientation: portrait) and (max-width: 640px) {
        body { padding: 6px; font-size: 13px; }

        .table-grid {
          grid-template-columns: minmax(80px, 100px) 1fr minmax(80px, 100px);
          gap: 3px;
        }

        .player-slot { padding: 5px 7px; min-width: 70px; }
        .player-name { font-size: 0.9em; }
        .player-pos  { font-size: 0.76em; gap: 2px; }

        .trick-grid { min-width: 110px; min-height: 105px; padding: 6px; gap: 4px; }

        .playing-card { width: 40px; height: 58px; padding: 2px; }
        .pc-rank { font-size: 12px; }
        .pc-sym  { font-size: 10px; }
        .pc-center { font-size: 18px; }
        .playing-card.compact { width: 34px; height: 48px; }
        .playing-card.compact .pc-rank { font-size: 10px; }
        .playing-card.compact .pc-sym  { font-size: 8px; }
        .playing-card.compact .pc-center { font-size: 14px; }
        .hand-fan { height: 72px; }

        button { padding: 9px 11px; font-size: 0.88em; min-height: 40px; }
        select, input { padding: 7px 8px; font-size: 0.88em; min-height: 40px; }

        h3 { font-size: 0.74em; margin-bottom: 5px; }
        .panel { padding: 7px 10px; margin: 4px 0; }
        .bid-panel { gap: 6px; }

        .game-header { gap: 6px 10px; padding: 6px 10px; }
      }
    </style>
    <script type="module" crossorigin src="/assets/index-CQFPfr94.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
